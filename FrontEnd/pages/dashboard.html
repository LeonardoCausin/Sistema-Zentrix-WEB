<!doctype html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zentrix Web | Dashboard</title>
  <script>
    (function () {
      try {
        var theme = localStorage.getItem('zentrix-theme');
        if (theme === 'dark' || theme === 'light') {
          document.documentElement.dataset.theme = theme;
        }
      } catch (error) {}
    })();
  </script>
  <style>
    html[data-theme="dark"], html[data-theme="dark"] body { background: #0a0c10; color: #f0f3f8; }
    html[data-theme="light"], html[data-theme="light"] body { background: #f8fafc; color: #0f172a; }
  </style>
  <link rel="stylesheet" href="../css/theme.css?v=20260614-final" />
  <link rel="stylesheet" href="../css/base.css?v=20260614-final" />
  <link rel="stylesheet" href="../css/layout.css?v=20260614-final" />
  <link rel="stylesheet" href="../css/components.css?v=20260614-final" />
  <link rel="stylesheet" href="../css/pages.css?v=20260614-final" />
  <link rel="stylesheet" href="../css/responsive.css?v=20260614-final" />
</head>

          <img class="brand-logo logo-dark" src="../assets/logo_dark.png" alt="Zentrix" />
          <span>Extensao online do Zentrix PDV</span>

        <nav class="nav-list">
