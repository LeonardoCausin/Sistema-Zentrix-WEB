name: Validacao Zentrix Web

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  backend:
    runs-on: self-hosted

    steps:
      - name: Baixar projeto
        uses: actions/checkout@v4

      - name: Bloquear arquivos locais versionados
        shell: bash
        run: |
          forbidden="$(git ls-files 'BackEnd/.env' 'BackEnd/target/**' '*.log')"
          if [ -n "$forbidden" ]; then
            echo "Arquivos locais nao podem ser versionados:"
            echo "$forbidden"
            exit 1
          fi

      - name: Testar backend
        run: mvn -B -q -f BackEnd/pom.xml test
