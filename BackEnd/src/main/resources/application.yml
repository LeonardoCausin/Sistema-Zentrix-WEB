server:
  port: 8080

spring:
  config:
    import:
      - "optional:file:.env[.properties]"
      - "optional:file:BackEnd/.env[.properties]"
  application:
    name: zentrix-web-api

zentrix:
  database:
    web:
      host: ${WEB_DB_HOST:${DB_HOST:localhost}}
      port: ${WEB_DB_PORT:${DB_PORT:3306}}
      name: ${WEB_DB_NAME:zentrix_web}
      username: ${WEB_DB_USER:${DB_USER:root}}
      password: ${WEB_DB_PASSWORD:${DB_PASSWORD:}}
      maximum-pool-size: ${WEB_DB_MAX_POOL_SIZE:10}
      minimum-idle: ${WEB_DB_MIN_IDLE:1}
      connection-timeout: ${WEB_DB_CONNECTION_TIMEOUT_MS:5000}
      validation-timeout: ${WEB_DB_VALIDATION_TIMEOUT_MS:3000}
      idle-timeout: ${WEB_DB_IDLE_TIMEOUT_MS:300000}
      max-lifetime: ${WEB_DB_MAX_LIFETIME_MS:1800000}
  sync:
    api-key: ${ZENTRIX_SYNC_KEY:}
    require-known-device-scope: ${ZENTRIX_SYNC_REQUIRE_KNOWN_DEVICE_SCOPE:true}
  setup:
    api-key: ${ZENTRIX_SETUP_KEY:}
  auth:
    token-ttl-minutes: ${ZENTRIX_AUTH_TOKEN_TTL_MINUTES:480}
    cookie:
      name: ${ZENTRIX_AUTH_COOKIE_NAME:ZENTRIX_AUTH}
      secure: ${ZENTRIX_AUTH_COOKIE_SECURE:false}
      same-site: ${ZENTRIX_AUTH_COOKIE_SAME_SITE:Lax}
      max-age-minutes: ${ZENTRIX_AUTH_COOKIE_MAX_AGE_MINUTES:480}
  rate-limit:
    enabled: ${ZENTRIX_RATE_LIMIT_ENABLED:true}
    default-limit: ${ZENTRIX_RATE_LIMIT_DEFAULT_LIMIT:240}
    default-window-seconds: ${ZENTRIX_RATE_LIMIT_DEFAULT_WINDOW_SECONDS:60}
    auth-limit: ${ZENTRIX_RATE_LIMIT_AUTH_LIMIT:30}
    auth-window-seconds: ${ZENTRIX_RATE_LIMIT_AUTH_WINDOW_SECONDS:300}
    sync-limit: ${ZENTRIX_RATE_LIMIT_SYNC_LIMIT:120}
    sync-window-seconds: ${ZENTRIX_RATE_LIMIT_SYNC_WINDOW_SECONDS:60}
    trust-proxy-headers: ${ZENTRIX_RATE_LIMIT_TRUST_PROXY_HEADERS:false}
  health:
    expose-details: ${ZENTRIX_HEALTH_DETAILS:false}
  security:
    csp-connect-src: ${ZENTRIX_CSP_CONNECT_SRC:}
  cors:
    allow-null-origin: ${ZENTRIX_CORS_ALLOW_NULL_ORIGIN:false}
    allowed-origins-csv: ${ZENTRIX_CORS_ALLOWED_ORIGINS:}
    allowed-origins:
      - "https://pdv.zentrixsystems.com.br"
      - "http://localhost:5500"
      - "http://localhost:5501"
      - "http://localhost:5502"
      - "http://127.0.0.1:5500"
      - "http://127.0.0.1:5501"
      - "http://127.0.0.1:5502"
